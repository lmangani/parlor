<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemma 4 Live Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid #222;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .status { font-size: 13px; padding: 4px 10px; border-radius: 12px; background: #1a1a1a; }
  .status.connected { color: #4ade80; }
  .status.disconnected { color: #f87171; }
  .status.processing { color: #facc15; }

  .main { flex: 1; display: flex; overflow: hidden; }
  .video-panel {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px; position: relative;
  }
  video {
    max-width: 100%; max-height: 100%;
    border-radius: 12px; background: #111; transform: scaleX(-1);
  }

  .chat-panel { width: 400px; border-left: 1px solid #222; display: flex; flex-direction: column; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; max-width: 90%; }
  .msg.user { background: #1e3a5f; align-self: flex-end; color: #c0d8f0; }
  .msg.assistant { background: #1a1a2e; align-self: flex-start; color: #d0d0e8; }
  .msg .meta { font-size: 11px; color: #666; margin-top: 4px; }

  .controls { padding: 16px 24px; border-top: 1px solid #222; display: flex; align-items: center; gap: 12px; }
  .toggle { background: #1a1a1a; color: #aaa; padding: 10px 14px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .toggle.active { background: #1a3a1a; color: #4ade80; }

  .state-indicator {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 14px; color: #888; height: 40px;
  }
  .state-dot {
    width: 10px; height: 10px; border-radius: 50%;
    transition: background 0.2s;
  }
  .state-dot.listening { background: #4ade80; animation: pulse 2s infinite; }
  .state-dot.processing { background: #facc15; animation: pulse 0.6s infinite; }
  .state-dot.speaking { background: #60a5fa; animation: pulse 1s infinite; }
  .state-dot.loading { background: #666; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
</style>
</head>
<body>

<header>
  <h1>Gemma 4 Live</h1>
  <span id="status" class="status disconnected">Disconnected</span>
</header>

<div class="main">
  <div class="video-panel">
    <video id="video" autoplay muted playsinline></video>
  </div>
  <div class="chat-panel">
    <div id="messages" class="messages"></div>
    <div class="controls">
      <div id="stateIndicator" class="state-indicator">
        <div id="stateDot" class="state-dot loading"></div>
        <span id="stateText">Loading VAD...</span>
      </div>
      <button id="cameraToggle" class="toggle active">Camera</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const video = $('video'), cameraToggle = $('cameraToggle');
const messagesDiv = $('messages'), statusEl = $('status');
const stateDot = $('stateDot'), stateText = $('stateText');

let ws, mediaStream, myvad;
let cameraEnabled = true;
let audioCtx, currentSource;
let state = 'loading'; // loading | listening | processing | speaking
let ignoreIncomingAudio = false;

// -- State Machine --
function setState(newState) {
  state = newState;
  stateDot.className = `state-dot ${newState}`;
  const labels = { loading: 'Loading VAD...', listening: 'Listening...', processing: 'Thinking...', speaking: 'Speaking...' };
  stateText.textContent = labels[newState] || newState;

  // Raise VAD threshold during speaking to reduce echo false triggers
  if (myvad) {
    if (newState === 'speaking') {
      myvad.setOptions({ positiveSpeechThreshold: 0.8 });
    } else {
      myvad.setOptions({ positiveSpeechThreshold: 0.5 });
    }
  }
}

// -- WebSocket --
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('connected', 'Connected');
    if (state !== 'loading') setState('listening');
  };
  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    setTimeout(connect, 2000);
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'text') {
      addMessage('assistant', msg.text, `LLM: ${msg.llm_time}s`);
    } else if (msg.type === 'audio') {
      if (ignoreIncomingAudio) {
        ignoreIncomingAudio = false;
        setState('listening');
        return;
      }
      playAudio(msg.audio, msg.tts_time);
    }
  };
}

function setStatus(cls, text) { statusEl.className = `status ${cls}`; statusEl.textContent = text; }

// -- Camera --
async function startCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    video.srcObject = mediaStream;
    return;
  } catch (e) { console.warn('Video+audio failed:', e.message); }

  const streams = await Promise.allSettled([
    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } }),
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }),
  ]);
  mediaStream = new MediaStream();
  streams.forEach(r => { if (r.status === 'fulfilled') r.value.getTracks().forEach(t => mediaStream.addTrack(t)); });
  if (mediaStream.getVideoTracks().length) video.srcObject = mediaStream;
  if (!mediaStream.getAudioTracks().length) { cameraEnabled = false; }
}

function captureFrame() {
  if (!cameraEnabled || !video.videoWidth) return null;
  const canvas = document.createElement('canvas');
  const scale = 320 / video.videoWidth;
  canvas.width = 320; canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// -- VAD Handlers --
function handleSpeechStart() {
  if (state === 'speaking') {
    // Barge-in: user is interrupting the AI
    stopPlayback();
    ignoreIncomingAudio = true;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'interrupt' }));
    }
    setState('listening');
    console.log('Barge-in: interrupted playback');
  }
}

function handleSpeechEnd(audio) {
  if (state !== 'listening') return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const wavBase64 = float32ToWavBase64(audio);
  const imageBase64 = captureFrame();

  setState('processing');
  setStatus('processing', 'Processing...');
  addMessage('user', '(voice message)', imageBase64 ? 'with camera' : '');

  const payload = { audio: wavBase64 };
  if (imageBase64) payload.image = imageBase64;
  ws.send(JSON.stringify(payload));
}

// -- Float32 @ 16kHz → WAV base64 --
function float32ToWavBase64(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); w(8,'WAVE'); w(12,'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  const bytes = new Uint8Array(buf);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// -- Playback --
function stopPlayback() {
  if (currentSource) {
    try { currentSource.stop(); } catch {}
    currentSource = null;
  }
}

async function playAudio(base64Wav, ttsTime) {
  stopPlayback();
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const bin = atob(base64Wav);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

  const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.start();
  currentSource = source;
  setState('speaking');

  source.onended = () => {
    currentSource = null;
    if (state === 'speaking') {
      setState('listening');
      setStatus('connected', 'Connected');
    }
  };

  const meta = messagesDiv.querySelector('.msg.assistant:last-child .meta');
  if (meta) meta.textContent += ` | TTS: ${ttsTime}s`;
}

// -- UI --
function addMessage(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${text}${meta ? `<div class="meta">${meta}</div>` : ''}`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

cameraToggle.addEventListener('click', () => {
  cameraEnabled = !cameraEnabled;
  cameraToggle.classList.toggle('active', cameraEnabled);
  cameraToggle.textContent = cameraEnabled ? 'Camera' : 'No Camera';
  video.style.opacity = cameraEnabled ? 1 : 0.3;
});

// -- Init --
async function init() {
  await startCamera();
  connect();

  // Initialize VAD with shared mic stream
  myvad = await vad.MicVAD.new({
    getStream: async () => {
      // Return a stream with only audio tracks for VAD
      return new MediaStream(mediaStream.getAudioTracks());
    },
    positiveSpeechThreshold: 0.5,
    negativeSpeechThreshold: 0.25,
    redemptionMs: 600,
    minSpeechMs: 300,
    preSpeechPadMs: 300,
    onSpeechStart: handleSpeechStart,
    onSpeechEnd: handleSpeechEnd,
    onVADMisfire: () => { console.log('VAD misfire (too short)'); },
    onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
    baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",
  });

  myvad.start();
  setState('listening');
  console.log('VAD initialized and listening');
}

init();
</script>
</body>
</html>
